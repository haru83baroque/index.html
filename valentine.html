<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #ffe6f0;
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    color: #ff4d88;
}

button {
    font-size: 1.5em;
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #ff4d4d;
    color: white;
    position: absolute;
}
</style>

</head>
<body>

<h1>Will you be my Valentine? 💖</h1>

<button id="yesBtn">Yes 💘</button>
<button id="noBtn">No 😢</button>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yesBtn").addEventListener("click", () => {
    document.body.innerHTML = `
        <h1 style="color:#ff4d88;">YAYYY!! 💖🥰</h1>
        <p style="font-size:20px;">You made me the happiest person!</p>
        <h2>❤️❤️❤️</h2>
    `;
});
</script>

</body>
</html>
